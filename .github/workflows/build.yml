name: Build Android APK

# Triggers: every push/PR to main, or manually via GitHub UI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Java JDK (required by Gradle / Android build tools) ─────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK (pre-installed on ubuntu-latest via ANDROID_HOME) ──
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ── 5. npm dependencies ────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── 6. Build www/ static assets ────────────────────────────────
      #    If ANYDOWN_SERVER_URL is set as a GitHub Actions secret, inject it
      #    into www/index.html so the Android APK knows where to call the API.
      - name: Build www directory
        run: npm run build:www

      - name: Inject server URL (optional)
        if: ${{ secrets.ANYDOWN_SERVER_URL != '' }}
        run: |
          sed -i "s|window.ANYDOWN_SERVER_URL = '';|window.ANYDOWN_SERVER_URL = '${{ secrets.ANYDOWN_SERVER_URL }}';|" www/index.html

      # ── 7. Add Android platform (only when android/ doesn't exist) ─
      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android/ directory already exists — skipping cap add"
          fi

      # ── 8. Sync Capacitor (copies www/ into the Android project) ───
      - name: Sync Capacitor to Android
        run: npx cap sync android

      # ── 9. Make Gradle wrapper executable ──────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 10. Build debug APK ────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 11. Upload APK as a GitHub artifact ────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: anydown-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
